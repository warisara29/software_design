# Confluent Cloud profile — activate with SPRING_PROFILES_ACTIVE=cloud
# Credentials read from env vars: KAFKA_API_KEY, KAFKA_API_SECRET

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:pkc-619z3.us-east1.gcp.confluent.cloud:9092}
spring.kafka.properties.security.protocol=SASL_SSL
spring.kafka.properties.sasl.mechanism=PLAIN
spring.kafka.properties.sasl.jaas.config=org.apache.kafka.common.security.plain.PlainLoginModule required username='${KAFKA_API_KEY}' password='${KAFKA_API_SECRET}';
spring.kafka.properties.session.timeout.ms=45000
spring.kafka.client-id=contract-draft-service

# Confluent Cloud Basic clusters may not allow programmatic topic creation —
# pre-create topics via Confluent UI/CLI:
#   booking.order.confirmed-topic, contract.draft.created-topic
spring.kafka.admin.fail-fast=false
